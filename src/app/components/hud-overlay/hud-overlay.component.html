<!-- ════════════════════════════════════════════════════════════
     HUD OVERLAY — Four corner panels over Three.js canvas
     ════════════════════════════════════════════════════════════ -->
<div class="hud-overlay" id="hud-overlay">

  <!-- ── TOP-LEFT: Identity ─────────────────────────────────── -->
  <div class="hud-panel hud-top-left" id="hud-identity" *ngIf="basics">
    <div class="hud-panel-inner">
      <div class="hud-corner-accent top-left"></div>
      <span class="hud-label">IDENTITY</span>
      <h2 class="hud-name">{{ basics.name }}</h2>
      <p class="hud-title">{{ basics.label }}</p>
      <div class="hud-tagline" *ngIf="basics['x-tagline']">
        <span class="hud-bracket">[</span>
        <span class="hud-tagline-text">{{ basics['x-tagline'] }}</span>
        <span class="hud-bracket">]</span>
      </div>
    </div>
  </div>

  <!-- ── TOP-RIGHT: Navigation ──────────────────────────────── -->
  <div class="hud-panel hud-top-right" id="hud-navigation">
    <div class="hud-panel-inner">
      <div class="hud-corner-accent top-right"></div>
      <span class="hud-label">NAV_LINKS</span>
      <nav class="hud-nav" aria-label="HUD Navigation">
        <a *ngFor="let link of navLinks"
           [href]="link.target"
           class="hud-nav-link"
           [id]="'hud-nav-' + link.label.toLowerCase()">
          <span class="hud-nav-indicator">▸</span>
          <span class="hud-nav-text">{{ link.label }}</span>
        </a>
      </nav>
    </div>
  </div>

  <!-- ── BOTTOM-LEFT: Social links ──────────────────────────── -->
  <div class="hud-panel hud-bottom-left" id="hud-social" *ngIf="profiles.length">
    <div class="hud-panel-inner">
      <div class="hud-corner-accent bottom-left"></div>
      <span class="hud-label">NETWORK</span>
      <div class="hud-social-links">
        <a *ngFor="let profile of profiles"
           [href]="profile.url"
           target="_blank"
           rel="noopener noreferrer"
           class="hud-social-link"
           [attr.aria-label]="profile.network"
           [id]="'hud-social-' + profile.network.toLowerCase()">
          <!-- GitHub SVG -->
          <svg *ngIf="profile.network === 'GitHub'" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.44 9.8 8.21 11.39.6.11.79-.26.79-.58v-2.17c-3.34.73-4.04-1.42-4.04-1.42-.55-1.39-1.34-1.76-1.34-1.76-1.08-.74.08-.73.08-.73 1.2.08 1.84 1.23 1.84 1.23 1.07 1.83 2.81 1.3 3.5 1 .1-.78.42-1.3.76-1.6-2.67-.3-5.47-1.33-5.47-5.93 0-1.31.47-2.38 1.24-3.22-.14-.3-.54-1.52.1-3.18 0 0 1-.32 3.3 1.23a11.5 11.5 0 016.02 0c2.28-1.55 3.29-1.23 3.29-1.23.64 1.66.24 2.88.12 3.18.77.84 1.23 1.91 1.23 3.22 0 4.61-2.81 5.63-5.48 5.92.42.36.81 1.1.81 2.22v3.29c0 .32.18.7.8.58A12.01 12.01 0 0024 12c0-6.63-5.37-12-12-12z"/>
          </svg>
          <!-- LinkedIn SVG -->
          <svg *ngIf="profile.network === 'LinkedIn'" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <path d="M20.45 20.45h-3.56v-5.57c0-1.33-.02-3.04-1.85-3.04-1.85 0-2.14 1.45-2.14 2.94v5.67H9.34V9h3.41v1.56h.05c.48-.9 1.64-1.85 3.37-1.85 3.6 0 4.27 2.37 4.27 5.46v6.28zM5.34 7.43a2.06 2.06 0 11-.01-4.13 2.06 2.06 0 01.01 4.13zM6.92 20.45H3.56V9h3.56v11.45zM22.22 0H1.77C.79 0 0 .77 0 1.73v20.54C0 23.23.79 24 1.77 24h20.45c.98 0 1.78-.77 1.78-1.73V1.73C24 .77 23.2 0 22.22 0z"/>
          </svg>
          <!-- Fallback icon for other networks -->
          <span *ngIf="profile.network !== 'GitHub' && profile.network !== 'LinkedIn'" class="hud-social-icon-text">
            {{ getSocialIcon(profile.network) }}
          </span>
          <span class="hud-social-name">{{ profile.network }}</span>
          <span class="hud-social-user">// {{ profile.username }}</span>
        </a>
      </div>
    </div>
  </div>

  <!-- ── BOTTOM-RIGHT: System Status ────────────────────────── -->
  <div class="hud-panel hud-bottom-right" id="hud-system-status">
    <div class="hud-panel-inner">
      <div class="hud-corner-accent bottom-right"></div>
      <span class="hud-label">SYS_STATUS</span>
      <div class="hud-status-terminal">
        <div *ngFor="let line of statusLines; let last = last" class="hud-status-line">
          <span class="hud-status-text">{{ line }}</span>
          <span *ngIf="last" class="hud-cursor">█</span>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Corner decorations ─────────────────────────────────── -->
  <div class="hud-crosshair hud-crosshair-tl"></div>
  <div class="hud-crosshair hud-crosshair-tr"></div>
  <div class="hud-crosshair hud-crosshair-bl"></div>
  <div class="hud-crosshair hud-crosshair-br"></div>
</div>
