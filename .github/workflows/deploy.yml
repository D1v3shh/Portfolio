# ═══════════════════════════════════════════════════════════════
# GitHub Actions — Build & Deploy to GitHub Pages
# Triggers on push to main (any file, including resume.json)
# Deploys production build to gh-pages branch
# ═══════════════════════════════════════════════════════════════

name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

# Sets permissions of the GITHUB_TOKEN to allow deployment
permissions:
  contents: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Node.js setup ─────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      # ── Install dependencies ──────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── Build production bundle ───────────────────────────────
      - name: Build Angular app
        run: npx ng build --configuration production

      # ── Copy index.html → 404.html for SPA routing ───────────
      - name: Create 404.html for SPA routing
        run: cp dist/portfolio-3d/browser/index.html dist/portfolio-3d/browser/404.html

      # ── Deploy to gh-pages branch ─────────────────────────────
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: dist/portfolio-3d/browser
          clean: true
